<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DA7756;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8956E;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Orbital rings -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="white" stroke-width="8" opacity="0.2"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="white" stroke-width="6" opacity="0.15"/>
  <!-- Core -->
  <circle cx="256" cy="256" r="50" fill="white" opacity="0.9"/>
  <!-- Orbiting dots -->
  <circle cx="256" cy="76" r="22" fill="white" opacity="0.85"/>
  <circle cx="410" cy="320" r="16" fill="white" opacity="0.6"/>
  <circle cx="120" cy="370" r="16" fill="white" opacity="0.4"/>
